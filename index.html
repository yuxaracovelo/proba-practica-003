<!DOCTYPE html>
<html>

<head>
    <title>Clínica Dental</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <div>Logo</div>
        <div class="menu">
            <a>Inicio</a>
            <a>Servizos</a>
            <a>Contacto</a>
        </div>
    </div>

    <div class="contenido">
        <div id="inicio">
            <h1>Benvidos á nosa clínica</h1>
            <p>Coidamos do teu sorriso en Santiago</p>
        </div>

        <div id="servizos">
            <h2>Os nosos servizos</h2>
            <div class="servizos">
                <div class="servizo">
                    <h3>Limpieza Dental</h3>
                    <p>Profesional</p>
                </div>
                <div class="servizo">
                    <h3>Revisións</h3>
                    <p>Chequeos</p>
                </div>
                <div class="servizo">
                    <h3>Urxencias</h3>
                    <p>Dispoñibles</p>
                </div>
            </div>
        </div>

        <div id="contacto">
            <h2>Pide cita</h2>
            <form>
                <input type="text">
                <input type="tel">
                <button>Enviar</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Clínica Dental Sonrisa</p>
        <p>Calle Ficticia, 123 - Santiago</p>
    </div>

</body>

</html>
